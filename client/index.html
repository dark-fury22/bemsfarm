<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1B4332" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="BemsFarms — Fresh Nigerian farm produce delivered to your door. AI-powered shopping, fair prices, direct from local farms." />

    <!--
      FAVICON: Using an inline SVG favicon so it works on all browsers
      without needing a separate file. Green background with a leaf emoji
      renders sharply at all tab sizes (16px, 32px, 64px).
      
      If you want to use your actual logo instead:
      1. Go to https://realfavicongenerator.net
      2. Upload your bemsfarms_logo.png
      3. Download the generated favicon package
      4. Put favicon.ico in client/public/
      5. Replace the line below with: <link rel="icon" href="/favicon.ico" />
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/bemsfarms_logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <title>BemsFarms — Fresh Nigerian Farm Produce</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
