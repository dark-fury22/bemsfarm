<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- White rounded square background -->
  <rect width="100" height="100" rx="16" fill="#FFFFFF"/>
  <!-- Green border to make it visible on white browser chrome -->
  <rect width="100" height="100" rx="16" fill="none" stroke="#1B4332" stroke-width="4"/>
  <!-- Your logo as an image centered and sized down -->
  <image href="/bemsfarms_logo.png" x="8" y="8" width="84" height="84" preserveAspectRatio="xMidYMid meet"/>
</svg>
